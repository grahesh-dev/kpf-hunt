<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPF Hunt — Checkpoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="scan-page">

  <div class="scan-wrap">

    <!-- ══ INVALID QR STATE ══ -->
    <div id="invalid-state" class="scan-card fade-up" style="display:none;">
      <div class="invalid-icon">⚠️</div>
      <h2 class="invalid-title">Invalid QR Code</h2>
      <p class="invalid-msg">
        This QR code isn't recognised.<br />
        Please scan a valid checkpoint QR code at one of the 5 stations.
      </p>
      <a href="index.html" class="btn btn-outline">← Back to Home</a>
    </div>

    <!-- ══ SCAN FORM STATE ══ -->
    <div id="form-state" class="scan-card fade-up" style="display:none;">

      <div class="scan-header">
        <div id="checkpoint-badge" class="checkpoint-badge">📍 Checkpoint —</div>
        <div class="kpf-wordmark">KPF Hunt</div>
      </div>

      <form id="scan-form" novalidate autocomplete="off">

        <!-- Team -->
        <div class="field-group">
          <label class="field-label" for="team-select">Your Team</label>
          <div class="select-wrap">
            <select id="team-select" class="field-input field-select" required>
              <option value="" disabled selected>Select your team…</option>
              <option value="Team Alpha">Team Alpha</option>
              <option value="Team Beta">Team Beta</option>
              <option value="Team Gamma">Team Gamma</option>
              <option value="Team Delta">Team Delta</option>
              <option value="Team Sigma">Team Sigma</option>
            </select>
            <span class="select-arrow" aria-hidden="true">▾</span>
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="password-input">Team Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="password-input"
              class="field-input"
              placeholder="Enter your team password"
              autocomplete="off"
              spellcheck="false"
              required
            />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <!-- Eye open (default) -->
              <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="pw-error" role="alert" aria-live="polite"></div>
        </div>

        <!-- Answer -->
        <div class="field-group">
          <label class="field-label" for="answer-input">Your Answer</label>
          <textarea
            id="answer-input"
            class="field-input field-textarea"
            placeholder="Type your answer here…"
            rows="4"
            required
          ></textarea>
          <div class="field-error" id="answer-error" role="alert" aria-live="polite"></div>
        </div>

        <!-- Form-level error -->
        <div class="form-error" id="form-error" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn btn-primary btn-submit" id="submit-btn">
          <span class="btn-text">Submit Answer</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

      </form>
    </div>

    <!-- ══ SUCCESS STATE ══ -->
    <div id="success-state" class="scan-card scan-card--success fade-up" style="display:none;">
      <div class="success-check pop-in" aria-hidden="true">✓</div>
      <h2 class="success-title">Answer Submitted!</h2>
      <p class="success-msg" id="success-msg">Good luck! 🎉</p>
      <p class="success-sub">Your answer has been recorded.<br />Head to the next checkpoint!</p>
    </div>

  </div><!-- /scan-wrap -->

  <script src="js/scan.js"></script>
</body>
</html>
