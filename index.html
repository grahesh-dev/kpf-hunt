<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPF Hunt 🎯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="welcome-page">

  <div class="welcome-wrap">

    <div class="welcome-card fade-up">

      <!-- KPF Logo -->
      <div class="kpf-logo">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="60" height="60" rx="16" fill="#000"/>
          <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
                fill="#fff" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="23" letter-spacing="-0.5">KPF</text>
        </svg>
      </div>

      <h1 class="welcome-title">KPF Hunt</h1>
      <p class="welcome-emoji">🎯</p>
      <p class="welcome-subtitle">
        Scan a QR code at each checkpoint<br />to submit your answer.
      </p>

      <div class="welcome-steps">
        <div class="step">
          <span class="step-num">1</span>
          <span class="step-text">Find a checkpoint around the venue</span>
        </div>
        <div class="step">
          <span class="step-num">2</span>
          <span class="step-text">Scan the QR code with your phone</span>
        </div>
        <div class="step">
          <span class="step-num">3</span>
          <span class="step-text">Select your team, enter your password &amp; answer</span>
        </div>
        <div class="step">
          <span class="step-num">4</span>
          <span class="step-text">Hit Submit — good luck! 🏆</span>
        </div>
      </div>

      <div class="welcome-badge">
        5 Checkpoints &nbsp;·&nbsp; 5 Teams &nbsp;·&nbsp; 1 Winner
      </div>

    </div>

    <footer class="welcome-footer">
      <a href="admin.html" class="admin-link">Admin Dashboard →</a>
    </footer>

  </div>

</body>
</html>
